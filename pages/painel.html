<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Meu Painel | Barbearia do Davi</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Firebase -->

  import { getAuth }        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, orderBy }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDK0bmVX9tTMCLw7fSDBrW-E8D3SK63DaY",
    authDomain: "barbearia-davi.firebaseapp.com",
    projectId: "barbearia-davi",
    storageBucket: "barbearia-davi.firebasestorage.app",
    messagingSenderId: "327274722401",
    appId: "1:327274722401:web:f2ddac69ff5d4161716620"
  };
  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  window._fb = { auth, db, doc, setDoc, getDoc, collection, getDocs, query, where, orderBy };
</script>

<link rel="stylesheet" href="../css/global.css">

<style>
/* ═══════════════════════════════════════
   PAINEL DO BARBEIRO — Estilos
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--black);
  color: var(--light);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Top bar ─────────────────────────── */
.painel-topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1rem;
  background: rgba(10,10,10,0.97);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.topbar-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 0.06em;
  color: var(--white);
}
.topbar-logo span { color: var(--red); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 0.7rem;
}
.btn-logout {
  background: none;
  border: 1px solid var(--border);
  color: var(--gray);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.3rem 0.7rem;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

/* ── Layout principal ────────────────── */
#painelApp {
  padding-top: 56px;
  max-width: 540px;
  margin: 0 auto;
  padding-bottom: 2rem;
}

/* ── Hero / Perfil ───────────────────── */
.painel-hero {
  background: linear-gradient(135deg, var(--card) 0%, var(--card2) 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 1.25rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1rem;
}
.painel-avatar {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: var(--card2);
  border: 2px solid var(--border-red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  flex-shrink: 0;
  overflow: hidden;
}
.painel-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.painel-hero-info {}
.painel-saudacao {
  font-size: 0.72rem;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 0.15rem;
}
.painel-nome {
  font-family: 'Oswald', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  line-height: 1.1;
}
.painel-esp {
  font-size: 0.78rem;
  color: var(--red);
  margin-top: 0.2rem;
  font-weight: 500;
}

/* ── Stats ───────────────────────────── */
.painel-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-bottom: 1px solid var(--border);
}
.stat-item {
  padding: 1rem 0.5rem;
  text-align: center;
  border-right: 1px solid var(--border);
}
.stat-item:last-child { border-right: none; }
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  line-height: 1;
  color: var(--white);
}
.stat-num.red { color: var(--red); }
.stat-num.green { color: #27ae60; }
.stat-label {
  font-size: 0.65rem;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.2rem;
}

/* ── Próximo cliente ─────────────────── */
.proximo-wrap {
  display: none;
  align-items: center;
  gap: 0.8rem;
  padding: 0.75rem 1.25rem;
  background: rgba(224,32,32,0.06);
  border-bottom: 1px solid var(--border-red);
}
.proximo-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--red);
  font-weight: 700;
  white-space: nowrap;
}
.proximo-info { display: flex; flex-wrap: wrap; align-items: center; gap: 0.4rem; font-size: 0.82rem; }
.prox-hora { font-weight: 700; color: var(--white); }
.prox-nome { color: var(--light); }
.prox-svc  { color: var(--gray); font-size: 0.75rem; }

/* ── Navegação de data ───────────────── */
.nav-data {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.9rem 1.25rem;
  border-bottom: 1px solid var(--border);
  background: var(--card);
  position: sticky;
  top: 56px;
  z-index: 50;
}
.nav-data-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--gray);
  width: 34px;
  height: 34px;
  border-radius: 2px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.nav-data-btn:hover { border-color: var(--red); color: var(--red); }
.nav-data-label {
  flex: 1;
  text-align: center;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--white);
}
.btn-hoje {
  background: var(--red);
  border: none;
  color: var(--white);
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 0.3rem 0.6rem;
  border-radius: 2px;
  cursor: pointer;
  transition: background 0.2s;
  font-family: 'Inter', sans-serif;
  white-space: nowrap;
}
.btn-hoje:hover { background: var(--red-dark); }

/* ── Lista de agendamentos ───────────── */
.lista-wrap {
  padding: 1rem 1rem 0;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.painel-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1rem;
  display: flex;
  gap: 0.9rem;
  align-items: flex-start;
  transition: border-color 0.2s;
  position: relative;
  overflow: hidden;
}
.painel-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--red);
  border-radius: 3px 0 0 3px;
}
.painel-card.card-feito::before    { background: #27ae60; }
.painel-card.card-cancelado::before { background: var(--gray3); }
.painel-card.card-feito    { opacity: 0.7; }
.painel-card.card-cancelado { opacity: 0.5; }

.painel-card-hora {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  color: var(--white);
  line-height: 1;
  min-width: 52px;
  text-align: center;
  padding-top: 0.1rem;
}
.painel-card.card-feito .painel-card-hora    { color: #27ae60; }
.painel-card.card-cancelado .painel-card-hora { color: var(--gray3); }

.painel-card-info { flex: 1; }

.painel-card-cliente {
  font-size: 1rem;
  font-weight: 700;
  color: var(--white);
  margin-bottom: 0.2rem;
}
.painel-card-svc {
  font-size: 0.8rem;
  color: var(--gray);
  margin-bottom: 0.4rem;
  line-height: 1.4;
}
.painel-card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  font-size: 0.72rem;
  color: var(--gray2);
  margin-bottom: 0.5rem;
}

.painel-card-badge {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.6rem;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border: 1px solid;
}
.badge-pendente {
  background: rgba(224,32,32,0.1);
  color: #ff6b6b;
  border-color: rgba(224,32,32,0.3);
}
.badge-feito {
  background: rgba(39,174,96,0.12);
  color: #27ae60;
  border-color: rgba(39,174,96,0.3);
}
.badge-cancelado {
  background: rgba(85,85,85,0.15);
  color: var(--gray2);
  border-color: var(--gray3);
}

/* ── Botão concluir ──────────────────── */
.btn-concluir {
  margin-top: 0.65rem;
  width: 100%;
  padding: 0.55rem;
  background: transparent;
  border: 1.5px solid #27ae60;
  color: #27ae60;
  border-radius: 3px;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Inter', sans-serif;
}
.btn-concluir:hover:not(:disabled) {
  background: #27ae60;
  color: #fff;
}
.btn-concluir:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ── Estado vazio ────────────────────── */
.painel-vazio {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--gray);
}
.painel-vazio-icon {
  font-size: 2.5rem;
  margin-bottom: 0.8rem;
  opacity: 0.4;
}
.painel-vazio-txt {
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--gray2);
}

/* ── Toast ───────────────────────────── */
#painelToast {
  position: fixed;
  bottom: 1.5rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card);
  border: 1px solid var(--red);
  color: var(--white);
  padding: 0.8rem 1.5rem;
  border-radius: 3px;
  font-size: 0.82rem;
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s;
  white-space: nowrap;
  box-shadow: 0 8px 32px rgba(224,32,32,0.2);
  pointer-events: none;
}
#painelToast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Loading skeleton ────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
  background-size: 200% 100%;
  animation: skel 1.2s infinite;
  border-radius: 2px;
}
@keyframes skel { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
</style>
</head>

<body>

<!-- ── Top bar ──────────────────────── -->
<header class="painel-topbar">
  <div class="topbar-logo">✂ Barbearia <span>Davi</span></div>
  <div class="topbar-right">
    <a href="../index.html" style="font-size:0.7rem;color:var(--gray);text-decoration:none;letter-spacing:0.06em;text-transform:uppercase">← Site</a>
    <button class="btn-logout" id="btnLogout">Sair</button>
  </div>
</header>

<!-- ── App ──────────────────────────── -->
<div id="painelApp">

  <!-- Hero / Perfil -->
  <div class="painel-hero">
    <div class="painel-avatar" id="painelAvatar">💈</div>
    <div class="painel-hero-info">
      <div class="painel-saudacao">Painel do barbeiro</div>
      <div class="painel-nome" id="painelNomeBarbeiro">—</div>
      <div class="painel-esp" id="painelEspecialidade">Barbeiro profissional</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="painel-stats">
    <div class="stat-item">
      <div class="stat-num" id="statTotal">—</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-item">
      <div class="stat-num red" id="statPendentes">—</div>
      <div class="stat-label">Pendentes</div>
    </div>
    <div class="stat-item">
      <div class="stat-num green" id="statFeitos">—</div>
      <div class="stat-label">Concluídos</div>
    </div>
  </div>

  <!-- Próximo cliente -->
  <div class="proximo-wrap" id="proximoWrap">
    <div class="proximo-label">⚡ Próximo</div>
    <div class="proximo-info" id="proximoCliente"></div>
  </div>

  <!-- Navegação de data -->
  <div class="nav-data">
    <button class="nav-data-btn" id="btnAnterior" title="Dia anterior">‹</button>
    <div class="nav-data-label" id="navDataLabel">Hoje</div>
    <button class="btn-hoje" id="btnHoje" style="display:none">Hoje</button>
    <button class="nav-data-btn" id="btnProximo" title="Próximo dia">›</button>
  </div>

  <!-- Lista de agendamentos -->
  <div class="lista-wrap" id="listaAgendamentos">
    <!-- Skeleton loading -->
    <div class="painel-card">
      <div class="painel-card-hora skeleton" style="width:52px;height:40px"> </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem">
        <div class="skeleton" style="height:18px;width:60%"> </div>
        <div class="skeleton" style="height:14px;width:80%"> </div>
        <div class="skeleton" style="height:12px;width:40%"> </div>
      </div>
    </div>
    <div class="painel-card">
      <div class="painel-card-hora skeleton" style="width:52px;height:40px"> </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem">
        <div class="skeleton" style="height:18px;width:50%"> </div>
        <div class="skeleton" style="height:14px;width:70%"> </div>
        <div class="skeleton" style="height:12px;width:30%"> </div>
      </div>
    </div>
  </div>

</div><!-- /painelApp -->

<script type="module" src="../js/painel.js"></script>
</body>
</html>
